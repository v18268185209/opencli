site: xiaohongshu
name: search
description: "小红书搜索 (via Pinia Store Action)"
domain: www.xiaohongshu.com
strategy: intercept
browser: true

args:
  keyword:
    type: str
    required: true
    description: Search keyword
  limit:
    type: int
    default: 20
    description: Number of items to return

columns: [title, author, likes, type, url]

pipeline:
  - navigate: https://www.xiaohongshu.com/search_result?keyword=${{ args.keyword }}&source=web_search_result_notes
  - wait: 3
  - tap:
      store: search
      action: fetchResult
      capture: search/notes
      select: data.items
      timeout: 8
  - map:
      id: ${{ item.id }}
      title: ${{ item.note_card.display_title }}
      type: ${{ item.note_card.type }}
      author: ${{ item.note_card.user.nickname }}
      likes: ${{ item.note_card.interact_info.liked_count }}
      url: https://www.xiaohongshu.com/explore/${{ item.id }}
  - limit: ${{ args.limit | default(20) }}
